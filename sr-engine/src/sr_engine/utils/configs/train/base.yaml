# Training Configuration
batch_size: 32
num_workers: 4
learning_rate: 2e-4
weight_decay: 0.0
betas: [0.9, 0.99]

# --- Epoch-based settings ---
max_epochs: 10        # Replaces max_steps
save_per_epoch: 5     # Saves every 5 epochs
checkpoint_dir: "experiments/checkpoints1"

# --- Training dynamics ---
lr_scheduler: cosine
warmup_steps: 2000
min_lr: 1e-7

# --- Losses ---
losses:
  perceptual_weight: 0.1
  # adversarial_weight: 0.01  # Not implemented yet