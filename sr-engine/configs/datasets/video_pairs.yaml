# Video degradation pipeline configuration
scale: 4
degradation:
  blur:
    kernel_size: 21
    sigma: [0.1, 3.0]
    prob: 1.0
  noise:
    gaussian_sigma: [1, 30]
    poisson_scale: [0.05, 3.0]
    prob: 1.0
  jpeg:
    quality: [30, 95]
    prob: 1.0
  resize:
    method: bicubic  # bicubic, bilinear, lanczos
frame_rate: 24
frame_format: png
