# Base training configuration
batch_size: 16
num_workers: 4
learning_rate: 2e-4
weight_decay: 0.0
betas: [0.9, 0.99]
max_steps: 300000
log_every: 100
save_every: 5000
eval_every: 5000
warmup_steps: 2000
lr_scheduler: cosine
min_lr: 1e-7
loss:
  l1_weight: 1.0
  perceptual_weight: 0.1
  adversarial_weight: 0.01
  gan_type: vanilla  # vanilla, rel_gan
