[project]
name = "sr-engine"
version = "0.1.0"
description = "Super-resolution engine for video/image data with CUDA and ROCm support"
requires-python = ">=3.11"
license = { text = "MIT" }
readme = "README.md"
dependencies = [
    "click>=8.1",
    "pyyaml>=6.0",
    "numpy>=1.24",
    "opencv-python>=4.8",
    "pillow>=10.0",
    "tqdm>=4.66",
]

[project.optional-dependencies]
cuda = [
    "torch>=2.2",
    "torchvision>=0.17",
]
rocm = [
    "torch>=2.2",
    "torchvision>=0.17",
]
cpu = [
    "torch>=2.2",
    "torchvision>=0.17",
]

[project.scripts]
srengine = "sr_engine.cli.main:cli"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.3",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
