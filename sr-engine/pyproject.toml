[project]
name = "sr-engine"
version = "0.1.0"
description = "Super-resolution engine for video/image data with CUDA and ROCm support"
requires-python = ">=3.11"
license = { text = "MIT" }
readme = "README.md"
dependencies = [
    "click>=8.1",
    "pyyaml>=6.0",
    "numpy>=1.24",
    "opencv-python>=4.8",
    "pillow>=10.0",
    "tqdm>=4.66",
    # 💡 torch removed from here to allow targeted backend installations
]

[project.optional-dependencies]
cpu = [
    "torch>=2.12.1",
    "torchvision",
]
cuda = [
    "torch>=2.12.1",
    "torchvision",
]
rocm = [
    "torch>=2.12.1; sys_platform == 'linux'",
    "torchvision; sys_platform == 'linux'",
]

[project.scripts]
srengine = "sr_engine.cli.main:cli"
dataset = "sr_engine.cli.cmd_dataset:dataset"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.3",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

# --- ⚙️ UV HARDWARE ACCELERATION INDEXES ---

[tool.uv]
conflicts = [
    [
        { extra = "cpu" },
        { extra = "cuda" },
        { extra = "rocm" }
    ]
]

[[tool.uv.index]]
name = "pytorch-cuda"
url = "https://download.pytorch.org/whl/cu121"
explicit = true

[[tool.uv.index]]
name = "pytorch-rocm"
url = "https://download.pytorch.org/whl/rocm7.2"
explicit = true

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[tool.uv.sources]
torch = [
    { index = "pytorch-cuda", extra = "cuda" },
    { index = "pytorch-rocm", extra = "rocm" },
    { index = "pytorch-cpu", extra = "cpu" },
]
torchvision = [
    { index = "pytorch-cuda", extra = "cuda" },
    { index = "pytorch-rocm", extra = "rocm" },
    { index = "pytorch-cpu", extra = "cpu" },
]