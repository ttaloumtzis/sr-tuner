# Video degradation pipeline configuration
scale: 4
degradation:
  color_jitter:
    enabled: false
    hue_range: [-0.05, 0.05]
    saturation_range: [-0.3, 0.3]
    value_range: [-0.3, 0.3]
    prob: 0.8
  blur:
    enabled: true
    gaussian:
      kernel_size: 21
      sigma: [0.1, 3.0]
      prob: 1.0
    motion:
      max_kernel_size: 31
      prob: 0.5
  resize:
    method: area       # area, bicubic, bilinear, lanczos, nearest
    antialias: true
  noise:
    enabled: false
    gaussian:
      sigma_range: [1, 30]
      prob: 0.5
    poisson:
      scale_range: [0.05, 3.0]
      prob: 0.5
    salt_pepper:
      amount: 0.01
      salt_vs_pepper: 0.5
      prob: 0.3
  jpeg:
    enabled: true
    quality_range: [30, 95]
    prob: 1.0
  jpeg2000:
    enabled: false
    quality_range: [30, 95]
    prob: 0.5
frame_rate: 10
frame_format: png
start_time: 0.0
duration: null
