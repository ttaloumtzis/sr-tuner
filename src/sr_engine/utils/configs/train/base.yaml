# Training Configuration
seed: 42
batch_size: 8
num_workers: 4
learning_rate: 2e-4
weight_decay: 0.0
betas: [0.9, 0.99]

# --- Epoch-based settings ---
max_epochs: 10
save_per_epoch: 5
checkpoint_dir: "experiments/checkpoints"

# --- Validation ---
validation:
  enabled: true
  split: 0.1

# --- Training dynamics ---
lr_scheduler: cosine
warmup_steps: 2000
min_lr: 1e-7

# --- Mixed precision ---
dtype: float32  # "bf16" enables bfloat16, "float16" enables fp16 + GradScaler

# --- Losses ---
losses:
  perceptual_weight: 0.1
  # adversarial_weight: 0.01  # Not implemented yet