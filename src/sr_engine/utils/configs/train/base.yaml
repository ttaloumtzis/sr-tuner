# Training Configuration
seed: 42
batch_size: 32
num_workers: 4
patch_size: 128
learning_rate: 2e-4
weight_decay: 0.0
betas: [0.9, 0.99]

# --- Epoch-based settings ---
max_epochs: 10
save_per_epoch: 5
checkpoint_dir: "experiments/checkpoints"

# --- Validation ---
validation:
  enabled: true
  split: 0.1

# --- Training dynamics ---
lr_scheduler: cosine
warmup_steps: 2000
min_lr: 1e-7

# --- Mixed precision ---
dtype: float32  # "bf16" enables bfloat16, "float16" enables fp16 + GradScaler

# --- Losses ---
# Each loss is a named entry with a "type" and "weight".
# Available types: l1, l2, vgg, edge, style, fft, ssim, lpips
# Type-specific params are passed as extra keys (e.g. layers for vgg/style).
losses:
  pixel:
    type: l1
    weight: 1.0
  perceptual:
    type: vgg
    weight: 0.1
    layers: ["relu5_4"]
  # Uncomment to enable additional losses:
  # edge:
  #   type: edge
  #   weight: 0.05
  # style:
  #   type: style
  #   weight: 0.01
  #   layers: ["relu1_2", "relu2_2", "relu3_4", "relu4_4", "relu5_2"]
  # fft:
  #   type: fft
  #   weight: 0.01
  # ssim:
  #   type: ssim
  #   weight: 0.1
  # lpips:
  #   type: lpips
  #   weight: 0.1